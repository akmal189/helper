{if $mode == 'product'}
	<script src="images/gallery/lightgallery.1.2.0.js"></script>
	<script src="images/gallery/lg-video.js"></script>
	<script src="images/gallery/lg-zoom.js"></script>
	<script src="images/gallery/video.js"></script>
	
	<script src="images/js/site_addons.js"></script>
{/if}


{if $product.meta.video && $product.meta.video_poster.filename}
    <div class="card-slider__item has-video">
        <div class="card-slider__image{if !$product.image_filename} no-image{/if}{if $shop2.my.gr_images_size}{if $site.product_settings.images_size=="2"} gr_image_3x4{elseif $site.product_settings.images_size=="3"} gr_image_2x3{elseif $site.product_settings.images_size=="4"} gr_image_4x3{elseif $site.product_settings.images_size=="5"} gr_image_3x2{else} gr_image_1x1{/if}{/if}">
            {if $product.image_filename}
                <a href="{$product.meta.video}">
                    <img src="{s3_img width=$card_image_width height=$card_image_height src=$product.meta.video_poster.filename method=$shop2.my.s3_img_method}" {if $site.product_settings.images_view} class="gr_image_contain"{/if} alt="{$product.name|htmlspecialchars}" title="{$product.name|htmlspecialchars}" />
                </a>
            {/if}
        </div>
    </div>
{/if}


{if $product.meta.video && $product.meta.video_poster.filename}
    <div class="card-slider__thumb has-video">
        <div class="card-slider__thumb-img{if !$product.image_filename} no-image{/if}{if $shop2.my.gr_images_size}{if $site.product_settings.images_size=="2"} gr_image_3x4{elseif $site.product_settings.images_size=="3"} gr_image_2x3{elseif $site.product_settings.images_size=="4"} gr_image_4x3{elseif $site.product_settings.images_size=="5"} gr_image_3x2{else} gr_image_1x1{/if}{/if}">
            {if $product.image_filename}
                <a href="javascript:void(0);">
                    <img src="{s3_img width=$card_small_image_width height=$card_small_image_height src=$product.meta.video_poster.filename method=$shop2.my.s3_img_method}" {if $site.product_settings.images_view} class="gr_image_contain"{/if}/>
                </a>
            {/if}
        </div>
    </div>
{/if}
